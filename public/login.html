<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Placar.digital - Login</title>
    <link rel="stylesheet" href="/app/theme.css">
  </head>
  <body class="login-page">
    <main class="auth-card">
      <img class="auth-logo" src="/app/logo-placar-digital.jpeg" alt="Placar.digital">
      <h1 class="auth-title">Entrar</h1>
      <p class="auth-subtitle">Acesse seus bolões, palpites e ranking em um só lugar.</p>
      <form id="loginForm" class="auth-form">
        <label>Email <input name="email" type="email" autocomplete="username" required></label>
        <label>Senha <input name="senha" type="password" autocomplete="current-password" required></label>
        <button type="submit">Entrar no Placar</button>
      </form>
      <p id="message" class="auth-message"></p>
    </main>
    <script src="/app/login.js"></script>
  </body>
</html>
