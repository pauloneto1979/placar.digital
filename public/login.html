<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title data-i18n="auth.loginTitle">Placar.digital - Login</title>
    <link rel="stylesheet" href="/app/theme.css">
  </head>
  <body class="login-page">
    <main class="auth-card">
      <label class="locale-switcher auth-locale-switcher"><span data-i18n="common.language">Idioma</span>
        <select id="localeSelect" aria-label="Idioma" data-i18n-aria-label="common.language">
          <option value="pt-BR">PT</option>
          <option value="en-US">EN</option>
          <option value="es-ES">ES</option>
        </select>
      </label>
      <img class="auth-logo" src="/app/logo-placar-digital.jpeg" alt="Placar.digital">
      <h1 class="auth-title" data-i18n="auth.loginHeading">Entrar</h1>
      <p class="auth-subtitle" data-i18n="auth.loginSubtitle">Acesse seus bolões, palpites e ranking em um só lugar.</p>
      <form id="loginForm" class="auth-form">
        <label><span data-i18n="auth.email">Email</span> <input name="email" type="email" autocomplete="username" required></label>
        <label><span data-i18n="auth.password">Senha</span> <input name="senha" type="password" autocomplete="current-password" required></label>
        <button type="submit" data-i18n="auth.submit">Entrar no Placar</button>
      </form>
      <p id="message" class="auth-message"></p>
    </main>
    <script src="/app/i18n/i18n.js"></script>
    <script src="/app/login.js"></script>
  </body>
</html>
