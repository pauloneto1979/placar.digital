<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title data-i18n="common.appName">Placar.digital</title>
    <link rel="stylesheet" href="/app/theme.css">
  </head>
  <body>
    <div id="shell" class="app-shell">
      <aside class="sidebar">
        <div>
          <div class="brand">
            <img src="/app/logo-placar-digital.jpeg" alt="Placar.digital">
            <div class="brand-copy">
              <strong>Placar.digital</strong>
              <span id="roleLabel" data-i18n="common.loading">Carregando...</span>
            </div>
          </div>
          <nav id="menu" class="menu"></nav>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <button id="menuButton" class="hamburger" type="button" aria-label="Abrir menu" data-i18n-aria-label="topbar.openMenu">
            <span></span><span></span><span></span>
          </button>
          <div class="page-title">
            <h1 id="pageTitle" data-i18n="nav.home">Placar</h1>
            <p id="pageSubtitle" data-i18n="subtitles.home">Resumo, ranking e próximos jogos.</p>
          </div>
          <div class="topbar-actions">
            <div id="bolaoSwitcher" class="bolao-switcher bolao-switcher-top" hidden>
              <label><span data-i18n="topbar.activePool">Bolão ativo</span> <select id="bolaoSelect"></select></label>
            </div>
            <label class="locale-pill" data-i18n-title="common.language">
              <span class="locale-pill__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" role="presentation"><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2Zm6.92 9h-3.1a15.67 15.67 0 0 0-1.38-5A8.06 8.06 0 0 1 18.92 11ZM12 4.08A13.72 13.72 0 0 1 13.86 11h-3.72A13.72 13.72 0 0 1 12 4.08ZM4.08 13h3.1a15.67 15.67 0 0 0 1.38 5A8.06 8.06 0 0 1 4.08 13Zm3.1-2h-3.1a8.06 8.06 0 0 1 4.48-5 15.67 15.67 0 0 0-1.38 5Zm4.82 8.92A13.72 13.72 0 0 1 10.14 13h3.72A13.72 13.72 0 0 1 12 19.92ZM14.26 13H9.74a13.74 13.74 0 0 1 0-2h4.52a13.74 13.74 0 0 1 0 2Zm.18 5a15.67 15.67 0 0 0 1.38-5h3.1a8.06 8.06 0 0 1-4.48 5Z"/></svg>
              </span>
              <span id="localeCurrentLabel" class="locale-pill__label">Português</span>
              <span class="locale-pill__arrow" aria-hidden="true">
                <svg viewBox="0 0 24 24" role="presentation"><path d="m6.7 9.3 5.3 5.3 5.3-5.3 1.4 1.4-6.7 6.6-6.7-6.6 1.4-1.4Z"/></svg>
              </span>
              <select id="localeSelect" aria-label="Idioma" data-i18n-aria-label="common.language">
                <option value="pt-BR">PT</option>
                <option value="en-US">EN</option>
                <option value="es-ES">ES</option>
              </select>
            </label>
            <button id="profileButton" class="ghost icon-button" type="button" aria-label="Meu perfil" title="Meu perfil" data-i18n-aria-label="topbar.profile" data-i18n-title="topbar.profile">
              <svg viewBox="0 0 24 24" role="presentation"><path d="m19.14 12.94.86-1.49-.86-1.49-1.71-.39-.73-1.67-1.74-.28-1.2-1.28h-1.72L10.84 6.6l-1.74.28-.73 1.67-1.71.39-.86 1.49.86 1.49 1.71.39.73 1.67 1.74.28 1.2 1.28h1.72l1.2-1.28 1.74-.28.73-1.67Zm-7.14 1.56A3.5 3.5 0 1 1 15.5 11 3.5 3.5 0 0 1 12 14.5Zm0-5A1.5 1.5 0 1 0 13.5 11 1.5 1.5 0 0 0 12 9.5Z"/></svg>
            </button>
            <button id="logoutButton" class="ghost icon-button" type="button" aria-label="Sair" title="Sair" data-i18n-aria-label="topbar.logout" data-i18n-title="topbar.logout">
              <svg viewBox="0 0 24 24" role="presentation"><path d="M10 17v-2h5V9h-5V7h7v10Zm-4 2a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h5v2H6v10h5v2Zm10.59-4.59L19 12l-2.41-2.41L18 8.17 21.83 12 18 15.83Z"/></svg>
            </button>
          </div>
        </header>
        <section id="content" class="content"></section>
        <p id="message" class="message"></p>
      </main>
    </div>
    <script src="/app/i18n/i18n.js"></script>
    <script src="/app/app.js"></script>
  </body>
</html>
