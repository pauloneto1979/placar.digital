<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Placar.digital</title>
    <link rel="stylesheet" href="/app/theme.css">
  </head>
  <body>
    <div id="shell" class="app-shell">
      <aside class="sidebar">
        <div>
          <div class="brand">
            <img src="/app/logo-placar-digital.jpeg" alt="Placar.digital">
            <div class="brand-copy">
              <strong>Placar.digital</strong>
              <span id="roleLabel">Carregando</span>
            </div>
          </div>
          <nav id="menu" class="menu"></nav>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <button id="menuButton" class="hamburger" type="button" aria-label="Abrir menu">
            <span></span><span></span><span></span>
          </button>
          <div class="page-title">
            <h1 id="pageTitle">Placar</h1>
            <p id="pageSubtitle">Visão geral do seu bolão.</p>
          </div>
          <div class="topbar-actions">
            <div id="bolaoSwitcher" class="bolao-switcher bolao-switcher-top" hidden>
              <label>Bolão ativo <select id="bolaoSelect"></select></label>
            </div>
            <button id="profileButton" class="ghost" type="button">Meu perfil</button>
            <button id="logoutButton" class="ghost" type="button">Sair</button>
          </div>
        </header>
        <section id="content" class="content"></section>
        <p id="message" class="message"></p>
      </main>
    </div>
    <script src="/app/app.js"></script>
  </body>
</html>
