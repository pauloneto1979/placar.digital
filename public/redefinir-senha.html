<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title data-i18n="passwordReset.title">Redefinir senha</title>
    <link rel="icon" type="image/x-icon" href="/app/assets/favicon/favicon.ico">
    <link rel="shortcut icon" href="/app/assets/favicon/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/app/assets/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/app/assets/favicon/favicon-192x192.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/app/assets/favicon/apple-touch-icon.png">
    <link rel="stylesheet" href="/app/theme.css">
  </head>
  <body class="login-page" data-token-flow="reset">
    <main class="auth-card">
      <img class="auth-logo" src="/app/logo-placar-digital.jpeg" alt="Placar.digital">
      <h1 class="auth-title" data-i18n="passwordReset.heading">Redefinir senha</h1>
      <p id="flowSubtitle" class="auth-subtitle" data-i18n="passwordReset.requestSubtitle">Informe seu e-mail para receber o link de recuperação.</p>
      <form id="requestForm" class="auth-form">
        <label><span data-i18n="auth.email">Email</span> <input name="email" type="email" autocomplete="email" required></label>
        <button type="submit" data-i18n="passwordReset.requestSubmit">Enviar link de recuperação</button>
      </form>
      <form id="tokenForm" class="auth-form" hidden>
        <label>
          <span data-i18n="passwordReset.newPassword">Nova senha</span>
          <span class="password-field">
            <input name="novaSenha" type="password" autocomplete="new-password" required data-password-toggle-input>
            <button class="ghost icon-action password-toggle" type="button" data-password-toggle aria-label="Mostrar senha" title="Mostrar senha"></button>
          </span>
        </label>
        <label>
          <span data-i18n="passwordReset.confirmPassword">Confirmar nova senha</span>
          <span class="password-field">
            <input name="confirmarNovaSenha" type="password" autocomplete="new-password" required data-password-toggle-input>
            <button class="ghost icon-action password-toggle" type="button" data-password-toggle aria-label="Mostrar senha" title="Mostrar senha"></button>
          </span>
        </label>
        <button type="submit" data-i18n="passwordReset.submit">Salvar nova senha</button>
      </form>
      <p id="message" class="auth-message"></p>
      <a class="auth-link auth-link--right" href="/app/login.html" data-i18n="passwordReset.backToLogin">Voltar ao login</a>
    </main>
    <script src="/app/i18n/i18n.js"></script>
    <script src="/app/account-token.js"></script>
  </body>
</html>
